<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SokoShamba - Farm Fresh, Direct to You</title>
    <style>
        :root {
            --forest-green: #2d6a4f;
            --emerald-green: #52b788;
            --mint-green: #95d5b2;
            --pale-mint: #d8f3dc;
            --earth-brown: #8b4513;
            --sunrise-orange: #ff7b00;
            --charcoal: #2c3e50;
            --slate-gray: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            color: var(--charcoal);
            background-color: #f8f9fa;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--forest-green);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
        }

        nav a {
            margin-left: 1rem;
            font-size: 0.95rem;
        }

        main {
            flex: 1;
            padding: 1rem;
            max-width: 960px;
            margin: 0 auto;
            width: 100%;
        }

        footer {
            background-color: var(--charcoal);
            color: white;
            text-align: center;
            padding: 1rem;
            font-size: 0.85rem;
        }

        footer a {
            color: var(--mint-green);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">SokoShamba</a>
        <nav>
            <a href="/">Home</a>
            {% if user.is_authenticated %}
                <a href="/cart/">Cart</a>
                <a href="/orders/">Orders</a>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 SokoShamba — 
        <a href="/terms/">Terms</a> | 
        <a href="/privacy/">Privacy</a></p>
    </footer>
</body>
</html>
