{% extends 'base.html' %}

{% block content %}
<a href="/orders/{{ order.id }}/" style="display: inline-block; margin-bottom: 1rem; color: var(--green-600); text-decoration: none; font-size: 0.9rem; font-weight: 600;">← Back to Order</a>

<h1 class="page-title">Leave a Review</h1>
<p class="page-subtitle">How was your order from <strong>{{ order.farmer.farm_name }}</strong>?</p>

<div class="card" style="padding: 1.5rem; max-width: 400px; margin: 0 auto;">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <label>Rating</label>
            <div id="star-rating" style="display: flex; gap: 0.25rem; font-size: 2rem; cursor: pointer;">
                <span data-value="1" style="color: #ccc;">&#9733;</span>
                <span data-value="2" style="color: #ccc;">&#9733;</span>
                <span data-value="3" style="color: #ccc;">&#9733;</span>
                <span data-value="4" style="color: #ccc;">&#9733;</span>
                <span data-value="5" style="color: #ccc;">&#9733;</span>
            </div>
            <input type="hidden" name="rating" id="rating-value" value="0">
        </div>

        <div class="input-group">
            <label for="text">Your Review (optional)</label>
            <textarea id="text" name="text" rows="3" placeholder="Share your experience..."></textarea>
        </div>

        <button type="submit" class="btn btn-cta" style="width: 100%;">Submit Review</button>
    </form>
</div>

<script>
    const stars = document.querySelectorAll('#star-rating span');
    const ratingInput = document.getElementById('rating-value');

    stars.forEach(star => {
        star.addEventListener('click', () => {
            const value = parseInt(star.getAttribute('data-value'));
            ratingInput.value = value;
            stars.forEach(s => {
                const sVal = parseInt(s.getAttribute('data-value'));
                s.style.color = sVal <= value ? '#ff7b00' : '#ccc';
            });
        });
    });
</script>
{% endblock %}
