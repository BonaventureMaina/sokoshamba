{% extends 'base.html' %}

{% block content %}
<h1 class="page-title">Farm Profile</h1>
<p class="page-subtitle">Update your farm details</p>

<div class="card" style="padding: 1.5rem; max-width: 500px; margin: 0 auto;">
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Avatar Section -->
        <div style="text-align: center; margin-bottom: 1.5rem;">
            <div id="avatar-container" style="width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 0.75rem; overflow: hidden; border: 2px dashed var(--gray-200); display: flex; align-items: center; justify-content: center; background: var(--gray-100); cursor: pointer;" onclick="document.getElementById('photo').click()">
                {% if farmer.photo_url %}
                <img id="avatar-preview" src="{{ farmer.photo_url.url }}" alt="{{ farmer.farm_name }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                <span id="avatar-placeholder" style="font-size: 2rem;">👤</span>
                {% endif %}
            </div>
            <input type="file" id="photo" name="photo" accept="image/*" style="display: none;" onchange="previewPhoto(event)">
            <button type="button" class="btn" style="background: white; border: 1px solid var(--gray-200); color: var(--charcoal); font-size: 0.85rem; padding: 0.4rem 1rem;" onclick="document.getElementById('photo').click()">Change Photo</button>
            {% if farmer.photo_url %}
            <br>
            <label style="font-size: 0.8rem; color: var(--gray-600); cursor: pointer; margin-top: 0.25rem; display: inline-block;">
                <input type="checkbox" name="remove_photo" style="width: 14px; height: 14px; vertical-align: middle;"> Remove photo
            </label>
            {% endif %}
        </div>

        <!-- Farm Name -->
        <div class="input-group">
            <label for="farm_name">Farm Name</label>
            <input type="text" id="farm_name" name="farm_name" value="{{ farmer.farm_name }}" placeholder="Your farm name" required>
        </div>

        <!-- Bio -->
        <div class="input-group">
            <label for="bio">Bio (optional)</label>
            <textarea id="bio" name="bio" rows="3" placeholder="Tell customers about your farm">{{ farmer.bio|default:'' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Changes</button>
    </form>
</div>

<script>
    function previewPhoto(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const container = document.getElementById('avatar-container');
                container.innerHTML = '<img id=\"avatar-preview\" src=\"' + e.target.result + '\" alt=\"Preview\" style=\"width: 100%; height: 100%; object-fit: cover;\">';
            };
            reader.readAsDataURL(file);
        }
    }
</script>
{% endblock %}
