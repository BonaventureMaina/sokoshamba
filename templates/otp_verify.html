{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h1 class="page-title">Verify OTP</h1>
    <p class="page-subtitle">Enter the 6‑digit code sent to <strong>{{ phone }}</strong></p>

    <div class="card" style="padding: 1.5rem;">
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label for="code">OTP Code</label>
                <input type="text" id="code" name="code" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required
                       style="font-size: 1.5rem; text-align: center; letter-spacing: 0.5rem;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify & Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.25rem; font-size: 0.85rem;">
            <a href="/login/" style="color: var(--green-600); text-decoration: none; font-weight: 600;">← Request new code</a>
        </p>
    </div>
</div>
{% endblock %}
